<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Formação Vigilante</title>
    <style>
        :root {
            --primaria: #1e40af;
            --secundaria: #475569;
            --sucesso: #16a34a;
            --erro: #dc2626;
            --fundo: #f1f5f9;
            --destaque-psp: #b91c1c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .contentor { background: white; width: 100%; max-width: 950px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .escondido { display: none !important; }
        
        /* Estilo dos Grupos e Botões (Fiel ao Original) */
        .secao-grupo { margin: 24px 0 10px 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        .titulo-grupo { font-size: 1.1rem; font-weight: bold; color: #1e293b; text-transform: uppercase; }
        
        .grid-botoes { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 10px; }
        .btn-modulo { padding: 12px; background: white; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: 0.2s; text-align: center; }
        .btn-modulo:hover { border-color: var(--primaria); background: #eff6ff; color: var(--primaria); }
        
        .btn-psp { width: 100%; padding: 20px; background: var(--destaque-psp); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(185, 28, 28, 0.2); }
        .btn-psp:hover { background: #991b1b; transform: translateY(-1px); }

        /* Quiz UI */
        .info-topo { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
        .pergunta-caixa { font-size: 1.2rem; margin: 20px 0; line-height: 1.5; min-height: 60px; }
        .opcoes-container { display: flex; flex-direction: column; gap: 8px; }
        .btn-opcao { padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 1rem; }
        .btn-opcao:hover:not(:disabled) { background: #f8fafc; border-color: var(--primaria); }
        
        .feedback { padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
        .correto { background: #dcfce7; color: #166534; border: 1px solid var(--sucesso); }
        .errado { background: #fee2e2; color: #991b1b; border: 1px solid var(--erro); }

        .score-big { font-size: 4rem; font-weight: bold; color: var(--primaria); text-align: center; margin: 20px 0; }
        .item-revisao { padding: 15px; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; background: #fafafa; border-left: 4px solid var(--secundaria); }
        
        .btn-acao { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 1rem; }
        .btn-next { background: var(--primaria); color: white; }
    </style>
</head>
<body>

<div class="contentor">
    <h1 id="titulo-topo" style="text-align: center; color: var(--primaria); margin-bottom: 30px;">Simulador de Formação Vigilante</h1>

    <div id="loader" style="text-align:center; padding: 50px;">⏳ A carregar base de dados...</div>

    <div id="menu-inicial" class="escondido">
        <button class="btn-psp" onclick="gerarExamePSP()">🛡️ EXAME FINAL MODELO PSP (20 QUESTÕES)</button>
        <div id="container-grupos"></div>
    </div>

    <div id="ecra-quiz" class="escondido">
        <div class="info-topo">
            <span id="txt-modulo"></span>
            <span id="txt-progresso"></span>
        </div>
        <div id="txt-pergunta" class="pergunta-caixa"></div>
        <div id="container-opcoes" class="opcoes-container"></div>
        
        <div id="caixa-feedback" class="feedback"></div>
        <button id="btn-proxima" class="btn-acao btn-next escondido" onclick="proxima()">PRÓXIMA PERGUNTA</button>
    </div>

    <div id="ecra-resultado" class="escondido">
        <h2 style="text-align:center">Avaliação Final</h2>
        <div id="score-percent" class="score-big">0%</div>
        <p id="resumo-stats" style="text-align:center; font-weight:bold;"></p>
        
        <button class="btn-acao btn-next" onclick="location.reload()">VOLTAR AO MENU</button>
        <button id="btn-ver-erros" class="btn-acao" style="background:var(--secundaria); color:white" onclick="mostrarRevisao()">REVER ERROS E OBSERVAÇÕES</button>

        <div id="zona-revisao" class="escondido" style="margin-top:20px;"></div>
    </div>
</div>

<script>
    const URL_MODULOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdV0-Xyu-KXHc9wV_Lldd0qOfuQlHYmsMkfIYow5b9dxl-2BQzDMHNHoufXG7yh7a1dnLKCtFXwzMA/pub?gid=0&single=true&output=tsv';
    const URL_PSP = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdV0-Xyu-KXHc9wV_Lldd0qOfuQlHYmsMkfIYow5b9dxl-2BQzDMHNHoufXG7yh7a1dnLKCtFXwzMA/pub?gid=1749048722&single=true&output=tsv';

    let dadosModulos = [];
    let dadosPSP = [];
    let perguntasAtuais = [];
    let historico = [];
    let index = 0, acertos = 0;

    async function carregarTudo() {
        try {
            const [resMod, resPsp] = await Promise.all([fetch(URL_MODULOS), fetch(URL_PSP)]);
            dadosModulos = processarTSV(await resMod.text(), false);
            dadosPSP = processarTSV(await resPsp.text(), true);
            renderizarMenu();
            document.getElementById('loader').classList.add('escondido');
            document.getElementById('menu-inicial').classList.remove('escondido');
        } catch (e) { document.getElementById('loader').innerText = "Erro na ligação."; }
    }

    function processarTSV(texto, ehPSP) {
        const linhas = texto.split(/\r?\n/);
        const cabecalho = linhas[0].split('\t').map(c => c.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
        return linhas.slice(1).map(linha => {
            const col = linha.split('\t');
            if (ehPSP) {
                return { tema: col[cabecalho.indexOf('tema')], modulo: col[cabecalho.indexOf('modulo')], pergunta: col[cabecalho.indexOf('pergunta')], 
                         opcoes: { A: col[cabecalho.indexOf('opcaoa')], B: col[cabecalho.indexOf('opcaob')], C: col[cabecalho.indexOf('opcaoc')], D: col[cabecalho.indexOf('opcaod')] },
                         resposta: (col[cabecalho.indexOf('resposta')] || '').trim().toUpperCase(), obs: col[cabecalho.indexOf('observacao')], tipo: 'ABCD' };
            } else {
                return { modulo: col[cabecalho.indexOf('modulo')], pergunta: col[cabecalho.indexOf('pergunta')], resposta: (col[cabecalho.indexOf('resposta')] || '').trim().toLowerCase(), 
                         obs: col[cabecalho.indexOf('observacao')], tipo: 'VF' };
            }
        }).filter(p => p.pergunta);
    }

    function renderizarMenu() {
        const container = document.getElementById('container-grupos');
        const modulos = [...new Set(dadosModulos.map(p => p.modulo))].sort();
        
        // Categorias originais
        const categorias = { "Módulos Base (BAS)": "BAS", "Módulos Vigilante (VIG)": "VIG", "Módulos Alarmes (ALM)": "ALM", "Outros": "" };

        Object.entries(categorias).forEach(([nome, prefixo]) => {
            const filtrados = modulos.filter(m => m.startsWith(prefixo));
            if (filtrados.length > 0) {
                const div = document.createElement('div');
                div.innerHTML = `<div class="secao-grupo"><span class="titulo-grupo">${nome}</span></div><div class="grid-botoes" id="grid-${prefixo}"></div>`;
                container.appendChild(div);
                
                filtrados.forEach(m => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-modulo';
                    btn.innerText = m;
                    btn.onclick = () => iniciarEstudo(m);
                    document.getElementById(`grid-${prefixo}`).appendChild(btn);
                });
            }
        });
    }

    function iniciarEstudo(m) {
        perguntasAtuais = dadosModulos.filter(p => p.modulo === m).sort(() => Math.random() - 0.5);
        document.getElementById('titulo-topo').innerText = "Módulo " + m;
        comecar();
    }

    function gerarExamePSP() {
        const temas = [...new Set(dadosPSP.map(p => p.tema))];
        perguntasAtuais = temas.slice(0, 20).map(t => {
            const pool = dadosPSP.filter(p => p.tema === t);
            return pool[Math.floor(Math.random() * pool.length)];
        }).sort(() => Math.random() - 0.5);
        document.getElementById('titulo-topo').innerText = "Exame Final PSP";
        comecar();
    }

    function comecar() {
        index = 0; acertos = 0; historico = [];
        document.getElementById('menu-inicial').classList.add('escondido');
        document.getElementById('ecra-quiz').classList.remove('escondido');
        mostrar();
    }

    function mostrar() {
        const p = perguntasAtuais[index];
        document.getElementById('txt-modulo').innerText = p.modulo || "PSP";
        document.getElementById('txt-progresso').innerText = `${index + 1} / ${perguntasAtuais.length}`;
        document.getElementById('txt-pergunta').innerText = p.pergunta;
        const container = document.getElementById('container-opcoes');
        container.innerHTML = '';
        
        if (p.tipo === 'VF') {
            ['verdadeiro', 'falso'].forEach(v => {
                const btn = document.createElement('button');
                btn.className = 'btn-opcao';
                btn.innerText = v.toUpperCase();
                btn.onclick = () => verificar(v);
                container.appendChild(btn);
            });
        } else {
            ['A', 'B', 'C', 'D'].forEach(l => {
                if (p.opcoes[l]) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-opcao';
                    btn.innerHTML = `<strong>${l})</strong> ${p.opcoes[l]}`;
                    btn.onclick = () => verificar(l);
                    container.appendChild(btn);
                }
            });
        }
        document.getElementById('caixa-feedback').style.display = 'none';
        document.getElementById('btn-proxima').classList.add('escondido');
    }

    function verificar(escolha) {
        const p = perguntasAtuais[index];
        const correta = escolha.toString().toLowerCase() === p.resposta.toLowerCase();
        if (correta) acertos++;
        historico.push({ ...p, escolha, status: correta });

        const fb = document.getElementById('caixa-feedback');
        fb.style.display = 'block';
        fb.className = `feedback ${correta ? 'correto' : 'errado'}`;
        fb.innerHTML = `<b>${correta ? '✓ Resposta Correta' : '✗ Resposta Incorreta'}</b><br>
                        Correta: ${p.resposta.toUpperCase()}<br>
                        <small>${p.obs || ''}</small>`;

        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = true);
        document.getElementById('btn-proxima').classList.remove('escondido');
    }

    function proxima() {
        index++;
        if (index < perguntasAtuais.length) mostrar();
        else finalizar();
    }

    function finalizar() {
        document.getElementById('ecra-quiz').classList.add('escondido');
        document.getElementById('ecra-resultado').classList.remove('escondido');
        const perc = Math.round((acertos / perguntasAtuais.length) * 100);
        document.getElementById('score-percent').innerText = perc + "%";
        document.getElementById('resumo-stats').innerText = `Acertos: ${acertos} de ${perguntasAtuais.length}`;
    }

    function mostrarRevisao() {
        const zona = document.getElementById('zona-revisao');
        zona.innerHTML = '<h3>Relatório de Questões:</h3>';
        historico.forEach((h, i) => {
            const div = document.createElement('div');
            div.className = 'item-revisao';
            div.style.borderLeftColor = h.status ? 'var(--sucesso)' : 'var(--erro)';
            div.innerHTML = `<b>${i+1}. ${h.pergunta}</b><br>
                             <span style="color:${h.status?'green':'red'}">A sua resposta: ${h.escolha.toUpperCase()}</span> | 
                             <b>Correta: ${h.resposta.toUpperCase()}</b><br>
                             <p style="font-size:0.9rem; margin-top:5px; font-style:italic;">${h.obs || ''}</p>`;
            zona.appendChild(div);
        });
        zona.classList.remove('escondido');
    }

    window.onload = carregarTudo;
</script>
</body>
</html>
