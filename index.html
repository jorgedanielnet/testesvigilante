<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparação para o Exame Final da PSP - Vigilante</title>
    <style>
        :root {
            --primaria: #1e40af;
            --secundaria: #475569;
            --sucesso: #16a34a;
            --erro: #dc2626;
            --fundo: #f1f5f9;
            --destaque-psp: #b91c1c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .contentor { background: white; width: 100%; max-width: 950px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .escondido { display: none !important; }
        
        /* Menu */
        .btn-psp { width: 100%; padding: 20px; background: var(--destaque-psp); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; margin-top: 20px; }
        .btn-psp:hover { background: #991b1b; transform: translateY(-2px); }

        /* Quiz UI */
        .info-topo { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .pergunta-caixa { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; color: #1e293b; min-height: 80px; }
        .opcoes-multiplas { display: flex; flex-direction: column; gap: 10px; }
        .btn-opcao { padding: 15px; border: 2px solid #cbd5e1; border-radius: 8px; background: white; cursor: pointer; text-align: left; transition: 0.2s; font-size: 1rem; }
        .btn-opcao:hover:not(:disabled) { border-color: var(--primaria); background: #f8fafc; }
        
        /* Feedback */
        .feedback { padding: 15px; border-radius: 8px; margin-top: 15px; display: none; line-height: 1.4; }
        .correto { background: #dcfce7; color: #166534; border: 1px solid var(--sucesso); }
        .errado { background: #fee2e2; color: #991b1b; border: 1px solid var(--erro); }

        /* Resultados */
        .card-resultado { text-align: center; padding: 20px; }
        .score-big { font-size: 4rem; font-weight: bold; color: var(--primaria); margin: 10px 0; }
        .classificacao { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        
        /* Tabela de Revisão */
        .revisao-lista { margin-top: 20px; text-align: left; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        .item-revisao { padding: 15px; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; background: #fff; }
        .item-revisao b { color: var(--destaque-psp); }
        
        .btn-acao { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-next { background: var(--primaria); color: white; }
        .btn-revisao { background: var(--secundaria); color: white; }
    </style>
</head>
<body>

<div class="contentor">
    <h1 id="titulo-principal" style="text-align: center; color: var(--primaria);">Preparação para o Exame Final da PSP - Vigilante</h1>

    <div id="loader" style="text-align:center; padding: 50px;">⏳ A carregar base de dados oficial...</div>

    <div id="menu-inicial" class="escondido">
        <p style="text-align:center; color: var(--secundaria);">Este simulador gera um exame de 20 perguntas, selecionando aleatoriamente uma de cada tema da base de dados.</p>
        <button class="btn-psp" onclick="gerarExamePSP()">INICIAR EXAME MODELO PSP (20 Questões)</button>
    </div>

    <div id="ecra-quiz" class="escondido">
        <div class="info-topo">
            <span id="txt-tema"></span>
            <span id="txt-progresso"></span>
        </div>
        <div id="txt-pergunta" class="pergunta-caixa"></div>
        <div id="container-opcoes" class="opcoes-multiplas"></div>
        
        <div id="caixa-feedback" class="feedback"></div>
        <button id="btn-proxima" class="btn-acao btn-next escondido" onclick="proxima()">PRÓXIMA PERGUNTA</button>
    </div>

    <div id="ecra-resultado" class="escondido">
        <div class="card-resultado">
            <h2>Resultado Final</h2>
            <div id="resumo-stats" style="color: var(--secundaria); font-weight: bold;"></div>
            <div id="score-percent" class="score-big">0%</div>
            <div id="txt-classificacao" class="classificacao"></div>
            
            <button class="btn-acao btn-next" onclick="location.reload()">NOVO EXAME</button>
            <button id="btn-ver-erros" class="btn-acao btn-revisao escondido" onclick="mostrarRevisao()">VER ONDE ERREI + OBSERVAÇÕES</button>
        </div>

        <div id="zona-revisao" class="revisao-lista escondido">
            <h3 style="color: var(--erro);">Relatório de Erros e Observações</h3>
            <div id="lista-erros"></div>
        </div>
    </div>
</div>

<script>
    const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRdV0-Xyu-KXHc9wV_Lldd0qOfuQlHYmsMkfIYow5b9dxl-2BQzDMHNHoufXG7yh7a1dnLKCtFXwzMA/pub?gid=1749048722&single=true&output=tsv';
    
    let baseDados = [];
    let perguntasExame = [];
    let historicoRespostas = [];
    let index = 0;
    let acertos = 0;

    async function carregarDados() {
        try {
            const resp = await fetch(TSV_URL);
            const text = await resp.text();
            const linhas = text.split(/\r?\n/);
            const cabecalho = linhas[0].split('\t').map(c => c.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));

            baseDados = linhas.slice(1).map(linha => {
                const col = linha.split('\t');
                return {
                    tema: col[cabecalho.indexOf('tema')] || 'Geral',
                    modulo: col[cabecalho.indexOf('modulo')] || 'PSP',
                    pergunta: col[cabecalho.indexOf('pergunta')],
                    opcoes: { A: col[cabecalho.indexOf('opcaoa')], B: col[cabecalho.indexOf('opcaob')], C: col[cabecalho.indexOf('opcaoc')], D: col[cabecalho.indexOf('opcaod')] },
                    resposta: (col[cabecalho.indexOf('resposta')] || '').trim().toUpperCase(),
                    obs: col[cabecalho.indexOf('observacao')] || ''
                };
            }).filter(p => p.pergunta);

            document.getElementById('loader').classList.add('escondido');
            document.getElementById('menu-inicial').classList.remove('escondido');
        } catch (e) {
            document.getElementById('loader').innerText = "Erro ao carregar dados. Verifique a ligação.";
        }
    }

    function gerarExamePSP() {
        // Lógica: Agrupar por tema e escolher uma pergunta aleatória de cada um (até 20)
        const temasMap = {};
        baseDados.forEach(p => {
            if (!temasMap[p.tema]) temasMap[p.tema] = [];
            temasMap[p.tema].push(p);
        });

        const temasDisponiveis = Object.keys(temasMap).sort(() => Math.random() - 0.5);
        perguntasExame = temasDisponiveis.slice(0, 20).map(t => {
            const lista = temasMap[t];
            return lista[Math.floor(Math.random() * lista.length)];
        });

        iniciar();
    }

    function iniciar() {
        index = 0; acertos = 0; historicoRespostas = [];
        document.getElementById('menu-inicial').classList.add('escondido');
        document.getElementById('ecra-quiz').classList.remove('escondido');
        mostrarPergunta();
    }

    function mostrarPergunta() {
        const p = perguntasExame[index];
        document.getElementById('txt-tema').innerText = `Tema: ${p.tema} (${p.modulo})`;
        document.getElementById('txt-progresso').innerText = `Questão ${index + 1} de ${perguntasExame.length}`;
        document.getElementById('txt-pergunta').innerText = p.pergunta;
        
        const container = document.getElementById('container-opcoes');
        container.innerHTML = '';
        
        ['A', 'B', 'C', 'D'].forEach(letra => {
            if (p.opcoes[letra]) {
                const btn = document.createElement('button');
                btn.className = 'btn-opcao';
                btn.innerHTML = `<strong>${letra})</strong> ${p.opcoes[letra]}`;
                btn.onclick = () => verificar(letra);
                container.appendChild(btn);
            }
        });

        document.getElementById('caixa-feedback').style.display = 'none';
        document.getElementById('btn-proxima').classList.add('escondido');
    }

    function verificar(escolha) {
        const p = perguntasExame[index];
        const correta = escolha === p.resposta;
        if (correta) acertos++;

        historicoRespostas.push({ 
            pergunta: p.pergunta, 
            modulo: p.modulo,
            escolha: escolha, 
            correta: p.resposta, 
            obs: p.obs,
            textoEscolha: p.opcoes[escolha],
            textoCorreta: p.opcoes[p.resposta],
            status: correta
        });

        const fb = document.getElementById('caixa-feedback');
        fb.style.display = 'block';
        fb.className = `feedback ${correta ? 'correto' : 'errado'}`;
        fb.innerHTML = `<b>${correta ? '✓ ACERTOU' : '✗ ERROU'}</b><br>
                        <b>Resposta Correta:</b> ${p.resposta}) ${p.opcoes[p.resposta]}<br>
                        ${p.obs ? `<small><i>${p.obs}</i></small>` : ''}`;

        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = true);
        document.getElementById('btn-proxima').classList.remove('escondido');
    }

    function proxima() {
        index++;
        if (index < perguntasExame.length) mostrarPergunta();
        else finalizar();
    }

    function finalizar() {
        document.getElementById('ecra-quiz').classList.add('escondido');
        document.getElementById('ecra-resultado').classList.remove('escondido');
        
        const total = perguntasExame.length;
        const perc = Math.round((acertos / total) * 100);
        const erros = total - acertos;

        document.getElementById('score-percent').innerText = `${perc}%`;
        document.getElementById('resumo-stats').innerText = `Perguntas: ${total} | Acertos: ${acertos} | Erros: ${erros}`;

        let classe = "";
        if (perc >= 90) classe = "Excelente! 🌟";
        else if (perc >= 75) classe = "Muito Bom! 👍";
        else if (perc >= 50) classe = "Suficiente ⚖️";
        else classe = "Precisa de Reforço 📚";
        
        document.getElementById('txt-classificacao').innerText = classe;

        if (erros > 0) document.getElementById('btn-ver-erros').classList.remove('escondido');
    }

    function mostrarRevisao() {
        const lista = document.getElementById('lista-erros');
        lista.innerHTML = '';
        historicoRespostas.forEach((h, i) => {
            if (!h.status) {
                const div = document.createElement('div');
                div.className = 'item-revisao';
                div.innerHTML = `
                    <b>Questão ${i + 1} [${h.modulo}]</b><br>
                    <p>${h.pergunta}</p>
                    <span style="color:var(--erro)">Sua resposta: ${h.escolha}) ${h.textoEscolha}</span><br>
                    <span style="color:var(--sucesso)">Resposta certa: ${h.correta}) ${h.textoCorreta}</span><br>
                    <p style="margin-top:8px; font-size:0.9rem; background:#f1f5f9; padding:10px; border-radius:5px;">
                        <b>OBS:</b> ${h.obs || 'Sem observações adicionais.'}
                    </p>
                `;
                lista.appendChild(div);
            }
        });
        document.getElementById('zona-revisao').classList.remove('escondido');
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = carregarDados;
</script>
</body>
</html>
