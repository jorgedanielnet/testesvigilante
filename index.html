<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Vigilante - Ultra Compatível</title>
    <style>
        :root { --primaria: #1e40af; --secundaria: #475569; --sucesso: #16a34a; --erro: #dc2626; --fundo: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--fundo); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .contentor { background: white; width: 100%; max-width: 850px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .escondido { display: none !important; }
        
        /* Menu */
        .grelha-modulos { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .btn-modulo { padding: 15px; background: white; border: 2px solid var(--primaria); color: var(--primaria); border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-modulo:hover { background: var(--primaria); color: white; transform: translateY(-2px); }
        .btn-total { grid-column: 1 / -1; background: #1e293b; color: white; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Quiz */
        .info-topo { display: flex; justify-content: space-between; color: var(--secundaria); font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .pergunta-caixa { font-size: 1.25rem; margin-bottom: 25px; line-height: 1.6; min-height: 100px; color: #1e293b; }
        .opcoes { display: flex; gap: 15px; }
        .btn-opcao { flex: 1; padding: 18px; font-size: 1.1rem; font-weight: bold; border: 2px solid #cbd5e1; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s; }
        .btn-opcao:hover { border-color: var(--primaria); background: #f0f7ff; }
        
        /* Feedback */
        .feedback { padding: 20px; border-radius: 10px; margin-top: 20px; display: none; line-height: 1.5; }
        .correto { background: #dcfce7; color: #166534; border: 1px solid var(--sucesso); }
        .errado { background: #fee2e2; color: #991b1b; border: 1px solid var(--erro); }
        
        .btn-next { width: 100%; padding: 15px; background: var(--secundaria); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .loading { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--primaria); font-weight: bold; }
    </style>
</head>
<body>

<div class="contentor">
    <h1 style="text-align: center; margin-bottom: 5px;">Simulador Vigilante</h1>
    <p style="text-align: center; color: var(--secundaria); margin-bottom: 20px;" id="sub-titulo">A ligar ao Google Sheets...</p>

    <div id="loader" class="loading">⏳ A carregar perguntas...</div>

    <div id="menu-selecao" class="escondido">
        <div id="lista-botoes" class="grelha-modulos"></div>
        <button class="btn-total" onclick="prepararQuiz('TOTAL')">SIMULADO COMPLETO (TODOS OS MÓDULOS)</button>
    </div>

    <div id="ecra-quiz" class="escondido">
        <div class="info-topo">
            <span id="txt-modulo"></span>
            <span id="txt-progresso"></span>
        </div>
        <div id="txt-pergunta" class="pergunta-caixa"></div>
        <div class="opcoes">
            <button class="btn-opcao" onclick="validar('Verdadeiro')">VERDADEIRO</button>
            <button class="btn-opcao" onclick="validar('Falso')">FALSO</button>
        </div>
        <div id="caixa-feedback" class="feedback"></div>
        <button id="btn-continuar" class="btn-next escondido" onclick="proxima()">PRÓXIMA PERGUNTA</button>
    </div>

    <div id="ecra-resultado" class="escondido">
        <h2 style="text-align: center;">Resultado do Teste</h2>
        <div id="percentagem" style="font-size: 4rem; text-align: center; font-weight: bold; color: var(--primaria); margin: 20px 0;">0%</div>
        <button class="btn-next" onclick="location.reload()" style="background: var(--primaria);">VOLTAR AO MENU</button>
    </div>
</div>

<script>
    // ID da tua folha tirado do teu link
    const SHEET_ID = '1vRdV0-Xyu-KXHc9wV_Lldd0qOfuQlHYmsMkfIYow5b9dxl-2BQzDMHNHoufXG7yh7a1dnLKCtFXwzMA';
    // Link usando a API GVIZ (contorna bloqueios de CORS)
    const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq&gid=0`;

    let baseDados = [];
    let perguntasQuiz = [];
    let atual = 0;
    let certas = 0;

    async function buscarPerguntas() {
        try {
            const res = await fetch(JSON_URL);
            const texto = await res.text();
            
            // Limpar a resposta do Google (vem com um prefixo de função)
            const jsonLimpo = JSON.parse(texto.substring(47, texto.length - 2));
            const linhas = jsonLimpo.table.rows;

            baseDados = linhas.map(r => ({
                modulo: r.c[0] ? r.c[0].v : '',
                pergunta: r.c[3] ? r.c[3].v : '',
                resposta: r.c[4] ? r.c[4].v : '',
                obs: r.c[5] ? r.c[5].v : ''
            })).filter(p => p.pergunta && p.modulo && p.pergunta !== "Pergunta");

            montarMenu();
        } catch (e) {
            document.getElementById('loader').innerHTML = "❌ Erro ao ligar à base de dados.<br><small>Verifique se o Google Sheets está 'Publicado na Web'.</small>";
        }
    }

    function montarMenu() {
        const mods = [...new Set(baseDados.map(p => p.modulo))].sort();
        const container = document.getElementById('lista-botoes');
        
        mods.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'btn-modulo';
            btn.innerText = m;
            btn.onclick = () => prepararQuiz(m);
            container.appendChild(btn);
        });

        document.getElementById('loader').classList.add('escondido');
        document.getElementById('sub-titulo').innerText = "Selecione o que deseja estudar:";
        document.getElementById('menu-selecao').classList.remove('escondido');
    }

    function prepararQuiz(filtro) {
        perguntasQuiz = filtro === 'TOTAL' ? [...baseDados] : baseDados.filter(p => p.modulo === filtro);
        perguntasQuiz.sort(() => Math.random() - 0.5);
        
        atual = 0; certas = 0;
        document.getElementById('menu-selecao').classList.add('escondido');
        document.getElementById('ecra-quiz').classList.remove('escondido');
        exibir();
    }

    function exibir() {
        const q = perguntasQuiz[atual];
        document.getElementById('txt-modulo').innerText = q.modulo;
        document.getElementById('txt-progresso').innerText = `${atual + 1} / ${perguntasQuiz.length}`;
        document.getElementById('txt-pergunta').innerText = q.pergunta;
        document.getElementById('caixa-feedback').style.display = 'none';
        document.getElementById('btn-continuar').classList.add('escondido');
        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = false);
    }

    function validar(escolha) {
        const q = perguntasQuiz[atual];
        const feedback = document.getElementById('caixa-feedback');
        const correta = escolha.toLowerCase() === String(q.resposta).trim().toLowerCase();
        
        if (correta) certas++;
        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = true);
        
        feedback.style.display = 'block';
        feedback.className = `feedback ${correta ? 'correto' : 'errado'}`;
        feedback.innerHTML = `<strong>${correta ? '✓ CORRETO' : '✗ INCORRETO'}</strong><br>${q.obs || ''}`;
        document.getElementById('btn-continuar').classList.remove('escondido');
    }

    function proxima() {
        atual++;
        if (atual < perguntasQuiz.length) exibir();
        else {
            document.getElementById('ecra-quiz').classList.add('escondido');
            document.getElementById('ecra-resultado').classList.remove('escondido');
            const perc = Math.round((certas/perguntasQuiz.length)*100);
            document.getElementById('percentagem').innerText = perc + "%";
        }
    }

    buscarPerguntas();
</script>
</body>
</html>
