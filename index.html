<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Vigilante - Edição Compatível</title>
    <style>
        :root { --primaria: #1e40af; --secundaria: #475569; --sucesso: #16a34a; --erro: #dc2626; --fundo: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--fundo); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .contentor { background: white; width: 100%; max-width: 850px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        .escondido { display: none !important; }
        .grelha-modulos { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
        .btn-modulo { padding: 15px; background: white; border: 2px solid var(--primaria); color: var(--primaria); border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-modulo:hover { background: var(--primaria); color: white; }
        .btn-total { grid-column: 1 / -1; background: #1e293b; color: white; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .info-topo { display: flex; justify-content: space-between; color: var(--secundaria); font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .pergunta-caixa { font-size: 1.25rem; margin-bottom: 25px; line-height: 1.6; min-height: 100px; color: #1e293b; }
        .opcoes { display: flex; gap: 15px; }
        .btn-opcao { flex: 1; padding: 18px; font-size: 1.1rem; font-weight: bold; border: 2px solid #cbd5e1; border-radius: 10px; background: white; cursor: pointer; }
        .feedback { padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .correto { background: #dcfce7; color: #166534; border: 1px solid var(--sucesso); }
        .errado { background: #fee2e2; color: #991b1b; border: 1px solid var(--erro); }
        .btn-next { width: 100%; padding: 15px; background: var(--secundaria); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .loading { text-align: center; padding: 40px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="contentor">
    <h1 style="text-align: center; margin-bottom: 10px;">Preparação para o Exame Final da PSP - Vigilante</h1>
    
    <div id="loader" class="loading">⏳ A estabelecer ligação segura com Google Sheets...</div>

    <div id="menu-selecao" class="escondido">
        <p style="text-align: center; color: var(--secundaria);">Selecione um módulo para iniciar:</p>
        <div id="lista-botoes" class="grelha-modulos"></div>
        <button class="btn-total" onclick="iniciarQuiz('TOTAL')">SIMULADO COMPLETO (TUDO)</button>
    </div>

    <div id="ecra-quiz" class="escondido">
        <div class="info-topo">
            <span id="txt-modulo"></span>
            <span id="txt-progresso"></span>
        </div>
        <div id="txt-pergunta" class="pergunta-caixa"></div>
        <div class="opcoes">
            <button class="btn-opcao" onclick="verificar('Verdadeiro')">VERDADEIRO</button>
            <button class="btn-opcao" onclick="verificar('Falso')">FALSO</button>
        </div>
        <div id="caixa-feedback" class="feedback"></div>
        <button id="btn-proxima" class="btn-next escondido" onclick="proxima()">PRÓXIMA PERGUNTA</button>
    </div>

    <div id="ecra-resultado" class="escondido">
        <h2 style="text-align: center;">Fim do Teste</h2>
        <div id="percentagem" style="font-size: 3.5rem; text-align: center; font-weight: bold; color: var(--primaria); margin: 20px 0;"></div>
        <button class="btn-next" onclick="location.reload()" style="background: var(--primaria);">RECOMEÇAR</button>
    </div>
</div>

<script>
    // ID da tua folha de cálculo (extraído do teu link)
    const SHEET_ID = '1vRdV0-Xyu-KXHc9wV_Lldd0qOfuQlHYmsMkfIYow5b9dxl-2BQzDMHNHoufXG7yh7a1dnLKCtFXwzMA';
    // Link para a API de visualização que contorna o CORS
    const DATA_URL = 'testes-vigilante-Folha1-4.csv';

    let todasPerguntas = [];
    let perguntasAtuais = [];
    let index = 0;
    let score = 0;

    function parseCSVLine(line) {
        const out = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            const next = line[i + 1];
            if (ch === '"') {
                if (inQuotes && next === '"') {
                    current += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (ch === ',' && !inQuotes) {
                out.push(current);
                current = '';
            } else {
                current += ch;
            }
        }
        out.push(current);
        return out.map(v => v.trim());
    }

    function normalizarResposta(valor) {
        const txt = String(valor || '').trim().toLowerCase();
        if (txt === 'verdadeiro' || txt === 'true' || txt === 'v') return 'Verdadeiro';
        if (txt === 'falso' || txt === 'false' || txt === 'f') return 'Falso';
        return String(valor || '').trim();
    }

    async function carregarDados() {
        try {
            const response = await fetch(DATA_URL);
            const text = await response.text();
            const linhas = text.split(/\r?\n/).filter(l => l.trim() !== '');
            if (linhas.length < 2) throw new Error('Sem dados suficientes');

            const headers = parseCSVLine(linhas[0]).map(h => h.toLowerCase());
            const idxModulo = headers.findIndex(h => h.includes('modulo') || h.includes('módulo'));
            const idxPergunta = headers.findIndex(h => h.includes('pergunta'));
            const idxResposta = headers.findIndex(h => h.includes('resposta'));
            const idxObs = headers.findIndex(h => h.includes('observ'));

            todasPerguntas = linhas.slice(1).map(l => {
                const c = parseCSVLine(l);
                return {
                    modulo: idxModulo >= 0 ? (c[idxModulo] || '') : '',
                    pergunta: idxPergunta >= 0 ? (c[idxPergunta] || '') : '',
                    resposta: normalizarResposta(idxResposta >= 0 ? c[idxResposta] : ''),
                    obs: idxObs >= 0 ? (c[idxObs] || '') : ''
                };
            }).filter(p => p.pergunta && p.modulo && p.resposta && p.pergunta.toLowerCase() !== 'pergunta');

            renderizarMenu();
        } catch (e) {
            console.error(e);
            document.getElementById('loader').innerHTML = "⚠️ <b>Erro ao carregar a base de dados</b><br><br>Confirme que o ficheiro CSV está na mesma pasta do HTML.";
        }
    }

    function renderizarMenu() {
        const modulos = [...new Set(todasPerguntas.map(p => p.modulo))].sort();
        const container = document.getElementById('lista-botoes');
        
        modulos.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'btn-modulo';
            btn.innerText = m;
            btn.onclick = () => iniciarQuiz(m);
            container.appendChild(btn);
        });

        document.getElementById('loader').classList.add('escondido');
        document.getElementById('menu-selecao').classList.remove('escondido');
    }

    function iniciarQuiz(m) {
        const base = m === 'TOTAL' ? [...todasPerguntas] : todasPerguntas.filter(p => p.modulo === m);
        perguntasAtuais = [...base].sort(() => Math.random() - 0.5).slice(0, 20);
        index = 0; score = 0;
        document.getElementById('menu-selecao').classList.add('escondido');
        document.getElementById('ecra-quiz').classList.remove('escondido');
        mostrar();
    }

    function mostrar() {
        const p = perguntasAtuais[index];
        document.getElementById('txt-modulo').innerText = "Módulo: " + p.modulo;
        document.getElementById('txt-progresso').innerText = (index + 1) + " / " + perguntasAtuais.length;
        document.getElementById('txt-pergunta').innerText = p.pergunta;
        document.getElementById('caixa-feedback').style.display = 'none';
        document.getElementById('btn-proxima').classList.add('escondido');
        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = false);
    }

    function verificar(esc) {
        const p = perguntasAtuais[index];
        const fb = document.getElementById('caixa-feedback');
        const correta = esc.toLowerCase() === String(p.resposta).toLowerCase();
        
        if(correta) score++;
        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = true);
        
        fb.style.display = 'block';
        fb.className = `feedback ${correta ? 'correto' : 'errado'}`;
        fb.innerHTML = `<b>${correta ? '✓ CERTO' : '✗ ERRADO'}</b><br>${p.obs || ''}`;
        document.getElementById('btn-proxima').classList.remove('escondido');
    }

    function proxima() {
        index++;
        if(index < perguntasAtuais.length) mostrar();
        else {
            document.getElementById('ecra-quiz').classList.add('escondido');
            document.getElementById('ecra-resultado').classList.remove('escondido');
            document.getElementById('percentagem').innerText = Math.round((score/perguntasAtuais.length)*100) + "%";
        }
    }

    window.onload = carregarDados;
</script>
</body>
</html>
