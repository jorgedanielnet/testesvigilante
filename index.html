<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador PSP - Apenas V/F</title>
    <style>
        :root { --primaria: #1e40af; --secundaria: #475569; --sucesso: #16a34a; --erro: #dc2626; --fundo: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--fundo); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .contentor { background: white; width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        h1 { color: #0f172a; text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--fundo); padding-bottom: 10px; }
        h2 { border-left: 5px solid var(--primaria); padding-left: 12px; font-size: 1.1rem; color: #1e293b; margin: 25px 0 10px 0; text-transform: uppercase; background: #f8fafc; padding: 8px; }
        .menu-seccao { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .botao { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; cursor: pointer; font-weight: 600; transition: 0.2s; color: var(--secundaria); font-size: 0.85rem; }
        .botao:hover { border-color: var(--primaria); background: #eff6ff; color: var(--primaria); }
        .botao-grupo { background: #f1f5f9; border: 1px dashed var(--primaria); color: var(--primaria); grid-column: 1 / -1; }
        .botao-exame { background: var(--primaria); color: white; border: none; width: 100%; font-size: 1rem; margin-top: 20px; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tag-modulo { font-size: 0.7rem; background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        .tag-origem { font-size: 0.7rem; background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .tag-criada { background: #fef9c3; color: #854d0e; }
        .pergunta-texto { font-size: 1.2rem; line-height: 1.5; margin: 25px 0; color: #0f172a; font-weight: 500; min-height: 80px; }
        .feedback { padding: 15px; border-radius: 8px; margin-top: 15px; display: none; border: 1px solid transparent; line-height: 1.4; }
        .correto { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .errado { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
        .escondido { display: none !important; }
        .opcoes-vf { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-vf { padding: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="contentor">
    <div id="ecra-inicio">
        <h1>Simulador V/F - Vigilante</h1>
        <div id="categorias-container"></div>
        <button class="botao-exame" onclick="iniciarQuiz('EXAME_GLOBAL')">🚀 EXAME GLOBAL V/F (20 QUESTÕES)</button>
    </div>

    <div id="ecra-quiz" class="escondido">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <div>
                <span id="modulo-atual" class="tag-modulo"></span>
                <span id="origem-atual" class="tag-origem"></span>
            </div>
            <span id="progresso" style="font-weight: bold; color: var(--primaria);"></span>
        </div>
        <div id="pergunta-txt" class="pergunta-texto"></div>
        <div id="opcoes-container" class="opcoes-vf">
            <button class="botao btn-vf" onclick="validar('Verdadeiro')">VERDADEIRO</button>
            <button class="botao btn-vf" onclick="validar('Falso')">FALSO</button>
        </div>
        <div id="feedback-caixa" class="feedback"></div>
        <button id="btn-proxima" class="botao-exame escondido" onclick="proximaPergunta()">PRÓXIMA QUESTÃO →</button>
    </div>

    <div id="ecra-resultado" class="escondido" style="text-align: center;">
        <h2>Resultado Final</h2>
        <div id="nota-final" style="font-size: 3.5rem; font-weight: 900; margin: 15px 0;">0%</div>
        <p id="detalhe-resultado"></p>
        <button class="botao-exame" onclick="location.reload()">VOLTAR AO MENU</button>
    </div>
</div>

<script>
    const URL_DADOS = 'https://opensheet.elk.sh/1eUOl-7IErlBTApVOhL06XtYFIL-ur41HtMWsCNsklfg/Folha1';
    let baseDados = [], perguntasAtuais = [], indiceAtual = 0, certas = 0;

    async function carregarDados() {
        try {
            const resposta = await fetch(URL_DADOS);
            const raw = await resposta.json();
            
            // FILTRAR APENAS VERDADEIRO OU FALSO
            baseDados = raw.filter(q => {
                const tipo = (q.Tipo || "").trim().toUpperCase();
                return q.Pergunta && (tipo === "V/F" || tipo === "VERDADEIRO OU FALSO");
            }).map(q => {
                // Correção automática de segurança para o Artigo 21
                let r = (q.Resposta || "").trim();
                if(q.Pergunta.toLowerCase().includes("resistir a qualquer ordem") && q.Pergunta.toLowerCase().includes("quando não seja possível recorrer")) r = "Verdadeiro";
                if(q.Pergunta.toLowerCase().includes("resistir a qualquer ordem") && q.Pergunta.toLowerCase().includes("mesmo na presença")) r = "Falso";

                return { ...q, Resposta: r };
            });

            gerarMenu();
        } catch (e) { alert("Erro ao carregar Google Sheets."); }
    }

    function gerarMenu() {
        const cats = { "BAS": "Base Jurídica (BAS)", "VIG": "Vigilância (VIG)", "ALM": "Sistemas (ALM)" };
        const container = document.getElementById('categorias-container');
        
        Object.keys(cats).forEach(pref => {
            const div = document.createElement('div');
            div.innerHTML = `<h2>${cats[pref]}</h2>`;
            const grid = document.createElement('div');
            grid.className = 'menu-seccao';
            
            const btnTudo = document.createElement('button');
            btnTudo.className = 'botao botao-grupo';
            btnTudo.innerText = `TREINO TOTAL ${pref}`;
            btnTudo.onclick = () => iniciarQuiz(`GRUPO_${pref}`);
            grid.appendChild(btnTudo);

            const mods = [...new Set(baseDados.filter(q => q.Módulo && q.Módulo.startsWith(pref)).map(q => q.Módulo))].sort();
            mods.forEach(m => {
                const b = document.createElement('button');
                b.className = 'botao';
                b.innerText = m;
                b.onclick = () => iniciarQuiz(m);
                grid.appendChild(b);
            });
            div.appendChild(grid);
            container.appendChild(div);
        });
    }

    function iniciarQuiz(modo) {
        indiceAtual = 0; certas = 0;
        if (modo === 'EXAME_GLOBAL') {
            perguntasAtuais = baseDados.sort(() => 0.5 - Math.random()).slice(0, 20);
        } else if (modo.startsWith('GRUPO_')) {
            const p = modo.split('_')[1];
            perguntasAtuais = baseDados.filter(q => q.Módulo.startsWith(p)).sort(() => 0.5 - Math.random());
        } else {
            perguntasAtuais = baseDados.filter(q => q.Módulo === modo).sort(() => 0.5 - Math.random());
        }
        
        if(perguntasAtuais.length === 0) return alert("Não existem perguntas V/F neste módulo.");

        document.getElementById('ecra-inicio').classList.add('escondido');
        document.getElementById('ecra-quiz').classList.remove('escondido');
        mostrarPergunta();
    }

    function mostrarPergunta() {
        const q = perguntasAtuais[indiceAtual];
        const origemEl = document.getElementById('origem-atual');
        
        document.getElementById('modulo-atual').innerText = q.Módulo;
        origemEl.innerText = (q.Origem || "Oficial").toUpperCase();
        origemEl.className = q.Origem?.toLowerCase() === 'criada' ? 'tag-origem tag-criada' : 'tag-origem';
        
        document.getElementById('progresso').innerText = `${indiceAtual + 1} / ${perguntasAtuais.length}`;
        document.getElementById('pergunta-txt').innerText = q.Pergunta;
        
        document.querySelectorAll('.btn-vf').forEach(b => {
            b.disabled = false;
            b.style.borderColor = '#cbd5e1';
        });
        document.getElementById('feedback-caixa').style.display = 'none';
        document.getElementById('btn-proxima').classList.add('escondido');
    }

    function validar(escolha) {
        const q = perguntasAtuais[indiceAtual];
        document.querySelectorAll('.btn-vf').forEach(b => b.disabled = true);
        
        const correta = escolha.toLowerCase() === q.Resposta.trim().toLowerCase();
        if(correta) certas++;

        const fb = document.getElementById('feedback-caixa');
        fb.innerHTML = `<strong>${correta ? '✓ CORRETO' : '✗ INCORRETO'}</strong><br>${q.Observação || ''}`;
        fb.className = `feedback ${correta ? 'correto' : 'errado'}`;
        fb.style.display = 'block';
        document.getElementById('btn-proxima').classList.remove('escondido');
    }

    function proximaPergunta() {
        indiceAtual++;
        if(indiceAtual < perguntasAtuais.length) mostrarPergunta();
        else {
            document.getElementById('ecra-quiz').classList.add('escondido');
            document.getElementById('ecra-resultado').classList.remove('escondido');
            const perc = Math.round((certas / perguntasAtuais.length) * 100);
            document.getElementById('nota-final').innerText = perc + "%";
            document.getElementById('detalhe-resultado').innerText = `Acertou ${certas} de ${perguntasAtuais.length} perguntas V/F.`;
        }
    }

    carregarDados();
</script>
</body>
</html>
