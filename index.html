<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Vigilante</title>
    <style>
        :root {
            --primaria: #1e40af;
            --secundaria: #475569;
            --sucesso: #16a34a;
            --erro: #dc2626;
            --fundo: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--fundo);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .contentor {
            background: white;
            width: 100%;
            max-width: 850px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .escondido {
            display: none !important;
        }

        .grelha-modulos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .btn-modulo {
            padding: 15px;
            background: white;
            border: 2px solid var(--primaria);
            color: var(--primaria);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-modulo:hover {
            background: var(--primaria);
            color: white;
        }

        .btn-total {
            grid-column: 1 / -1;
            background: #1e293b;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .info-topo {
            display: flex;
            justify-content: space-between;
            color: var(--secundaria);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pergunta-caixa {
            font-size: 1.25rem;
            margin-bottom: 25px;
            line-height: 1.6;
            min-height: 100px;
            color: #1e293b;
        }

        .opcoes {
            display: flex;
            gap: 15px;
        }

        .btn-opcao {
            flex: 1;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            background: white;
            cursor: pointer;
        }

        .btn-opcao:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .feedback {
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .correto {
            background: #dcfce7;
            color: #166534;
            border: 1px solid var(--sucesso);
        }

        .errado {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid var(--erro);
        }

        .btn-next {
            width: 100%;
            padding: 15px;
            background: var(--secundaria);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .nota {
            font-size: 0.95rem;
            color: #64748b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="contentor">
    <h1 style="text-align: center; margin-bottom: 10px;">Simulador Vigilante</h1>

    <div id="loader" class="loading">
        ⏳ A carregar perguntas...
        <div class="nota">A ler dados da Google Sheet...</div>
    </div>

    <div id="menu-selecao" class="escondido">
        <p style="text-align: center; color: var(--secundaria);">Selecione um módulo para iniciar:</p>
        <div id="lista-botoes" class="grelha-modulos"></div>
        <button class="btn-total" onclick="iniciarQuiz('TOTAL')">SIMULADO COMPLETO (TUDO)</button>
    </div>

    <div id="ecra-quiz" class="escondido">
        <div class="info-topo">
            <span id="txt-modulo"></span>
            <span id="txt-progresso"></span>
        </div>

        <div id="txt-pergunta" class="pergunta-caixa"></div>

        <div class="opcoes">
            <button class="btn-opcao" onclick="verificar('Verdadeiro')">VERDADEIRO</button>
            <button class="btn-opcao" onclick="verificar('Falso')">FALSO</button>
        </div>

        <div id="caixa-feedback" class="feedback"></div>
        <button id="btn-proxima" class="btn-next escondido" onclick="proxima()">PRÓXIMA PERGUNTA</button>
    </div>

    <div id="ecra-resultado" class="escondido">
        <h2 style="text-align: center;">Fim do Teste</h2>
        <div id="percentagem" style="font-size: 3.5rem; text-align: center; font-weight: bold; color: var(--primaria); margin: 20px 0;"></div>
        <div id="resumo-final" style="text-align: center; color: var(--secundaria); font-weight: bold; margin-bottom: 20px;"></div>
        <button class="btn-next" onclick="location.reload()" style="background: var(--primaria);">RECOMEÇAR</button>
    </div>
</div>

<script>
    const SHEET_ID = '1eUOl-7IErlBTApVOhL06XtYFIL-ur41HtMWsCNsklfg';
    const GID = '0';
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

    let todasPerguntas = [];
    let perguntasAtuais = [];
    let index = 0;
    let score = 0;

    async function carregarDados() {
        try {
            const response = await fetch(DATA_URL, { cache: 'no-store' });

            if (!response.ok) {
                throw new Error(`Falha HTTP: ${response.status}`);
            }

            const text = await response.text();

            if (!text.includes('google.visualization.Query.setResponse')) {
                throw new Error('Resposta inválida da Google Sheet.');
            }

            const jsonText = text.substring(47, text.length - 2);
            const jsonData = JSON.parse(jsonText);

            if (!jsonData.table || !jsonData.table.rows) {
                throw new Error('Estrutura de dados inválida.');
            }

            const linhas = jsonData.table.rows;

            todasPerguntas = linhas.map(r => ({
                modulo: r.c?.[0]?.v?.toString().trim() || '',
                pergunta: r.c?.[3]?.v?.toString().trim() || '',
                resposta: r.c?.[4]?.v?.toString().trim() || '',
                obs: r.c?.[5]?.v?.toString().trim() || ''
            })).filter(p =>
                p.modulo &&
                p.pergunta &&
                p.resposta &&
                p.pergunta.toLowerCase() !== 'pergunta'
            );

            if (!todasPerguntas.length) {
                throw new Error('A folha foi lida, mas não foram encontradas perguntas válidas.');
            }

            renderizarMenu();
        } catch (erro) {
            console.error(erro);
            document.getElementById('loader').innerHTML = `
                ⚠️ <b>Erro de acesso aos dados</b><br><br>
                Verifique estes pontos:<br>
                1. A Google Sheet está partilhada para <b>qualquer pessoa com a ligação</b>;<br>
                2. O <b>gid</b> corresponde à folha certa;<br>
                3. O site está a abrir por HTTP/HTTPS;<br>
                4. O browser não está a bloquear pedidos externos.<br><br>
                <span style="font-size: 0.95rem; color: #64748b;">Detalhe técnico: ${erro.message}</span>
            `;
        }
    }

    function renderizarMenu() {
        const modulos = [...new Set(todasPerguntas.map(p => p.modulo))].sort((a, b) => a.localeCompare(b, 'pt'));
        const container = document.getElementById('lista-botoes');
        container.innerHTML = '';

        modulos.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'btn-modulo';
            btn.innerText = m;
            btn.onclick = () => iniciarQuiz(m);
            container.appendChild(btn);
        });

        document.getElementById('loader').classList.add('escondido');
        document.getElementById('menu-selecao').classList.remove('escondido');
    }

    function baralhar(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function iniciarQuiz(m) {
        perguntasAtuais = m === 'TOTAL'
            ? [...todasPerguntas]
            : todasPerguntas.filter(p => p.modulo === m);

        baralhar(perguntasAtuais);

        index = 0;
        score = 0;

        document.getElementById('menu-selecao').classList.add('escondido');
        document.getElementById('ecra-resultado').classList.add('escondido');
        document.getElementById('ecra-quiz').classList.remove('escondido');

        mostrar();
    }

    function mostrar() {
        const p = perguntasAtuais[index];
        document.getElementById('txt-modulo').innerText = 'Módulo: ' + p.modulo;
        document.getElementById('txt-progresso').innerText = (index + 1) + ' / ' + perguntasAtuais.length;
        document.getElementById('txt-pergunta').innerText = p.pergunta;

        const fb = document.getElementById('caixa-feedback');
        fb.style.display = 'none';
        fb.innerHTML = '';
        fb.className = 'feedback';

        document.getElementById('btn-proxima').classList.add('escondido');
        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = false);
    }

    function verificar(escolha) {
        const p = perguntasAtuais[index];
        const fb = document.getElementById('caixa-feedback');
        const correta = escolha.trim().toLowerCase() === String(p.resposta).trim().toLowerCase();

        if (correta) score++;

        document.querySelectorAll('.btn-opcao').forEach(b => b.disabled = true);

        fb.style.display = 'block';
        fb.className = `feedback ${correta ? 'correto' : 'errado'}`;
        fb.innerHTML = `
            <b>${correta ? '✓ CERTO' : '✗ ERRADO'}</b><br>
            <b>Resposta correta:</b> ${p.resposta}<br>
            ${p.obs ? `<br>${p.obs}` : ''}
        `;

        document.getElementById('btn-proxima').classList.remove('escondido');
    }

    function proxima() {
        index++;

        if (index < perguntasAtuais.length) {
            mostrar();
        } else {
            document.getElementById('ecra-quiz').classList.add('escondido');
            document.getElementById('ecra-resultado').classList.remove('escondido');

            const percentagem = Math.round((score / perguntasAtuais.length) * 100);
            document.getElementById('percentagem').innerText = percentagem + '%';
            document.getElementById('resumo-final').innerText = `Acertos: ${score} em ${perguntasAtuais.length}`;
        }
    }

    window.onload = carregarDados;
</script>

</body>
</html>
